{% extends "base.html" %}
{% block content %}
<div class="dashboard-card">
    <h2>Добро пожаловать, {{ current_user.username }}</h2>

    <div class="accounts-overview">
        <div class="account-card">
            <h3>Основной счёт</h3>
            <div class="account-balance">₽{{ current_user.balance }}</div>
        </div>

        <div class="account-card">
            <h3>Накопления</h3>
            <div class="account-balance">₽{{ savings.balance }}</div>
        </div>
    </div>

    <div class="dashboard-actions">
        <a href="/transfer" class="btn primary">Переводы</a>
        <a href="/payments" class="btn secondary">Платежи</a>
        <a href="/savings" class="btn accent">Накопления</a>
        <a href="/history" class="btn secondary">История</a>
    </div>
</div>
{% endblock %}
